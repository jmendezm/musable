version: '3.8'

services:
  musable:
    image: registry.git.breadjs.nl/musable/musable:latest

    container_name: musable
    restart: unless-stopped
    ports:
      - "3000:3000"  # Frontend server
      - "3001:3001"  # Backend API

    environment:
      # Server Configuration
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_PORT=3001

      # Force rebuild on startup (set to 'true' to force reinstall and rebuild)
      # Only set to true if you need to force a rebuild, otherwise leave as 'false'
      - FORCE_REBUILD=false

      # Frontend Configuration
      # Change localhost to your server's IP or domain name
      - REACT_APP_BASE_URL=http://localhost:3000
      - REACT_APP_API_BASE_URL=http://localhost:3001/api
      - REACT_APP_WEBSOCKET_URL=ws://localhost:3001

      # JWT Secret (CHANGE THIS!)
      - JWT_SECRET=change-this-super-secret-jwt-key-in-production
      - JWT_EXPIRES_IN=7d

      # Session Secret (CHANGE THIS!)
      - SESSION_SECRET=change-this-super-secret-session-key-in-production

      # Library Settings
      - SUPPORTED_FORMATS=["mp3","flac","wav","m4a","aac","ogg"]

      # Admin Settings (CHANGE THESE!)
      - ADMIN_EMAIL=admin@admin.com
      - ADMIN_PASSWORD=admin123

      # Rate Limiting
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100

      # CORS Settings
      - CORS_ORIGIN=*

      # Logging
      - LOG_LEVEL=info

    volumes:
      # ================================
      # CONFIGURE YOUR PATHS BELOW
      # ================================

      # Your music library
      # Change ./music to where your music files are stored on your host
      - ./music:/music:ro

      # ALL application data (database, uploads, logs, yt-downloads, sessions)
      # Change ./musable-data to wherever you want your data stored
      - ./musable-data:/app/backend/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
