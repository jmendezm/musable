stages:
  - build
  - push

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2

# Build and push Musable image
build-push-musable:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  before_script:
    - echo "Waiting for Docker daemon to start..."
    - timeout 60 sh -c 'until docker info; do sleep 1; done'
    # GitLab automatically fills $CI_REGISTRY, $CI_REGISTRY_USER, and $CI_REGISTRY_PASSWORD
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin registry.git.breadjs.nl:5050
  script:
    - echo "Building Musable image..."
    # $CI_REGISTRY_IMAGE already includes your subdomain and project path
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - echo "Pushing Musable image to GitLab registry..."
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
    - dev
    - tags

# Create specific release tags only when a git tag is pushed
release-tag:
  stage: push
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin registry.git.breadjs.nl:5050
  script:
    - echo "Creating release tag for $CI_COMMIT_TAG..."
    - docker pull $CI_REGISTRY_IMAGE:latest
    - docker tag $CI_REGISTRY_IMAGE:latest $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  only:
    - tags