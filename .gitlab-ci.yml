stages:
  - build
  - push

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  # Define your custom registry address here so you only change it in one place
  INTERNAL_REGISTRY: "192.168.1.20:5050"
  # This builds the full image path using the internal IP
  INTERNAL_IMAGE_PATH: "$INTERNAL_REGISTRY/$CI_PROJECT_PATH"

# Build and push Musable image
build-push-musable:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--insecure-registry=192.168.1.20:5050"]
  before_script:
    - echo "Waiting for Docker daemon to start..."
    - timeout 60 sh -c 'until docker info; do sleep 1; done'
    # Use the variable for login
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $INTERNAL_REGISTRY
  script:
    - echo "Building Musable image..."
    # Tag using the Internal Image Path variable
    - docker build -t $INTERNAL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA .
    - docker tag $INTERNAL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA $INTERNAL_IMAGE_PATH:latest
    - echo "Pushing Musable image to GitLab registry..."
    - docker push $INTERNAL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA
    - docker push $INTERNAL_IMAGE_PATH:latest
  only:
    - main
    - dev
    - tags

# Create specific release tags only when a git tag is pushed
release-tag:
  stage: push
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--insecure-registry=192.168.1.20:5050"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $INTERNAL_REGISTRY
  script:
    - echo "Creating release tag for $CI_COMMIT_TAG..."
    - docker pull $INTERNAL_IMAGE_PATH:latest
    - docker tag $INTERNAL_IMAGE_PATH:latest $INTERNAL_IMAGE_PATH:$CI_COMMIT_TAG
    - docker push $INTERNAL_IMAGE_PATH:$CI_COMMIT_TAG
  only:
    - tags