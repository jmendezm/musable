stages:
  - build
  - push

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2
  INTERNAL_REGISTRY: "192.168.1.20:5050"
  INTERNAL_IMAGE_PATH: "$INTERNAL_REGISTRY/$CI_PROJECT_PATH"

# Build and push Musable image
build-musable:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      # We keep this as a backup, but the daemon.json below is the primary fix
      command: ["--insecure-registry=192.168.1.20:5050"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        IMAGE_NAME: "latest"
    - if: $CI_COMMIT_BRANCH == "dev"
      variables:
        IMAGE_NAME: "latest-dev"
  before_script:
    # 1. Create the Docker config directory
    - mkdir -p /etc/docker
    # 2. Force the daemon to recognize your IP:Port as insecure via a config file
    - echo "{\"insecure-registries\":[\"192.168.1.20:5050\"]}" > /etc/docker/daemon.json
    - echo "Waiting for Docker daemon to start..."
    - timeout 60 sh -c 'until docker info; do sleep 1; done'
    # 3. Standard Login
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $INTERNAL_REGISTRY
  script:
    - echo "Building Musable image..."
    - docker build -t $INTERNAL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA .
    - docker tag $INTERNAL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA $INTERNAL_IMAGE_PATH:$IMAGE_NAME
    - echo "Pushing Musable image to GitLab registry..."
    - docker push $INTERNAL_IMAGE_PATH:$CI_COMMIT_SHORT_SHA
    - docker push $INTERNAL_IMAGE_PATH:$IMAGE_NAME

# Create specific release tags only when a git tag is pushed
release-tag:
  stage: push
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false", "--insecure-registry=192.168.1.20:5050"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $INTERNAL_REGISTRY
  script:
    - echo "Creating release tag for $CI_COMMIT_TAG..."
    - docker pull $INTERNAL_IMAGE_PATH:latest
    - docker tag $INTERNAL_IMAGE_PATH:latest $INTERNAL_IMAGE_PATH:$CI_COMMIT_TAG
    - docker push $INTERNAL_IMAGE_PATH:$CI_COMMIT_TAG
  only:
    - tags