stages:
  - build
  - push

variables:
  IMAGE: $CI_REGISTRY_IMAGE
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

# Build and push Musable image
build-push-musable:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin git.breadjs.nl
  script:
    - echo "Building Musable image..."
    - docker build -t $IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker build -t $IMAGE:latest .
    - echo "Pushing Musable image to GitLab registry..."
    - docker push $IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $IMAGE:latest
  only:
    - main
    - dev
    - tags

# Optional: Create release tags
release-tag:
  stage: push
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin git.breadjs.nl
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Creating release tag for $CI_COMMIT_TAG..."
        docker pull $IMAGE:latest
        docker tag $IMAGE:latest $IMAGE:$CI_COMMIT_TAG
        docker push $IMAGE:$CI_COMMIT_TAG
        echo "Release tag created successfully!"
      fi
  only:
    - tags